name: Build EXE

on: workflow_dispatch

permissions: write-all

jobs:
  # Cross-compile
  xgo:
    strategy:
      fail-fast: false
      matrix:
        go_version:
          - 1.21
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ">=1.21.0"
      #- name: Test package
      #  run: go test ./...
      - name: Build with xgo
        uses: crazy-max/ghaction-xgo@v3
        with:
          xgo_version: latest
          go_version: ${{ matrix.go_version }}
          dest: build
          prefix: Flowcharter
          targets: windows/amd64
          v: true
          x: false
          race: false
          ldflags: -s -w
          buildmode: default
      - name: Release
        run: gh release create $date --generate-notes build/Flowcharter-windows-amd64.exe
